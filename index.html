<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lux Hotel</title>
        <link rel="stylesheet" href="./style/style.css">
    </head>
    <body>
        <aside class="sidebar">
            <div class="logo">
                <img src="components/images/lux-logo.svg" alt="Lux Hotel Logo">
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="#">
                        <img src="./components/images/icons/House.svg" alt>
                        Dashboard</a>
                </li>
                <li>
                    <a href="#">
                        <img src="./components/images/icons/People.svg" alt>
                        Hóspedes</a>
                </li>
                <li>
                    <a href="#">
                        <img src="./components/images/icons/Bed.svg"
                            alt>
                        Quartos</a>
                </li>
                <li>
                    <a href="#">
                        <img src="./components/images/icons/Config.svg" />
                        Configurações</a>
                </li>
            </ul>
            <div class="bottom-sidebar">
                <ul class="sidebar-menu">

                    <li>
                        <a href="#">
                            <img src="./components/images/icons/Logout.svg" />
                            Sair</a>
                    </li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1>Dashboard</h1>
                <div class="user-profile">
                    <div class="user-info">
                        <img src="./components/images/icons/user.svg" alt="...">
                        <h4>Denilson Torres</h4>
                        <span>Administrador</span>
                    </div>
                </div>
            </header>

            <section class="cards-container">
                <div class="card">
                    <h3>Reservas</h3>
                    <p>128</p>
                </div>
                <div class="card">
                    <h3>Hóspedes</h3>
                    <p>54</p>
                </div>
                <div class="card">
                    <h3>Quartos Livres</h3>
                    <p>23</p>
                </div>
            </section>
        </main>
    </body>
</html>
